services:
  - type: web
    name: easibillity-api
    env: python
    buildCommand: python -m venv venv && ./venv/bin/pip install -r requirements.txt
    startCommand: ./venv/bin/uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
